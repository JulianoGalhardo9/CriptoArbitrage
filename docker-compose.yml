services:
  db:
    image: mariadb:latest
    container_name: crypto-mysql
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: CryptoDb
      MARIADB_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "mariadb", "-u", "root", "-proot_password", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    container_name: crypto-migrator
    working_dir: /src
    volumes:
      - .:/src
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=CryptoDb;User=root;Password=root_password;
    command: >
      bash -c "
        dotnet tool install --global dotnet-ef --version 9.0.0 2>/dev/null;
        export PATH=\"$$PATH:/root/.dotnet/tools\" &&
        dotnet ef migrations add ${MIGRATION_NAME} --project CryptoArbitrage.Infrastructure --startup-project CryptoArbitrage.API
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crypto-network
    profiles:
      - migration

  api:
    build: .
    container_name: crypto-api
    ports:
      - "5174:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=CryptoDb;User=root;Password=root_password;
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crypto-network
    volumes:
      - ./logs:/app/Logs

networks:
  crypto-network:
    driver: bridge